<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Watchlist — EMA 30/60</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: #c8c8c8; font-family: 'Roboto', sans-serif; font-size: 13px; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: #111; border-bottom: 1px solid #333;
    padding: 0 16px; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: #00aaff; letter-spacing: 2px; }
  .logo span { color: #ff8c00; }
  .header-right { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #666; display: flex; align-items: center; gap: 18px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #00cc44; display: inline-block; margin-right: 5px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  /* ── CONTROLS ── */
  .controls {
    padding: 8px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: #0a0a0a; border-bottom: 1px solid #222;
  }
  .controls input[type=text] {
    background: #1a1a1a; border: 1px solid #333; color: #ddd;
    padding: 5px 10px; border-radius: 3px; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; width: 180px; outline: none;
  }
  .controls input[type=text]:focus { border-color: #00aaff; }
  .btn { padding: 5px 14px; border-radius: 3px; border: 1px solid #444; background: #1a1a1a; color: #aaa; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; }
  .btn:hover { border-color: #00aaff; color: #00aaff; }
  .ticker-count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #555; margin-left: auto; }
  .ticker-count span { color: #00aaff; }

  /* ── CHART CARDS ── */
  .charts-container { padding: 6px 0; display: flex; flex-direction: column; gap: 6px; }

  .chart-card { background: #0a0a0a; border: 1px solid #1e1e1e; border-left: none; border-right: none; overflow: hidden; }

  /* StockCharts-style header bar */
  .chart-header {
    background: #111;
    border-bottom: 1px solid #2a2a2a;
    padding: 5px 12px;
    display: flex; align-items: center; gap: 0;
    flex-wrap: wrap;
  }
  .ticker-label {
    font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: 700;
    color: #fff; letter-spacing: 1px; min-width: 70px;
  }
  .price-block { display: flex; align-items: center; gap: 10px; flex: 1; }
  .price-val   { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #fff; }
  .chg.up { color: #00cc44; font-size: 12px; font-family: 'Share Tech Mono', monospace; }
  .chg.dn { color: #ff4444; font-size: 12px; font-family: 'Share Tech Mono', monospace; }
  .sep { color: #333; margin: 0 6px; }

  /* EMA value pills — StockCharts style */
  .ema-vals { display: flex; align-items: center; gap: 6px; }
  .ema-pill {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    padding: 1px 7px; border-radius: 2px; font-weight: 600;
  }
  .ema-pill.e30 { background: #ff8c00; color: #000; }
  .ema-pill.e60 { background: #1e90ff; color: #fff; }
  .ema-label    { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #555; }

  .chart-status { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #666; padding: 4px 12px; min-height: 20px; }

  .chart-body { width: 100%; height: 500px; }
  .vol-body   { width: 100%; height: 60px; border-top: 1px solid #111; }

  footer { text-align: center; padding: 16px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #333; border-top: 1px solid #1a1a1a; margin-top: 8px; }
  #scrollTop { position: fixed; bottom: 20px; right: 20px; width: 36px; height: 36px; background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 3px; font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 200; }
  #scrollTop.visible { display: flex; }
</style>
</head>
<body>

<header>
  <div class="logo">WATCH<span>LIST</span></div>
  <div class="header-right">
    <span><span class="live-dot"></span>LIVE</span>
    <span id="clock">--:--:--</span>
    <span>DAILY OHLC · EMA30 · EMA60 · VOL · 3M</span>
  </div>
</header>

<div class="controls">
  <input type="text" id="filterInput" placeholder="Search ticker..." oninput="filterCharts(this.value)">
  <button class="btn" onclick="document.getElementById('filterInput').value='';filterCharts('')">CLEAR</button>
  <button class="btn" onclick="scrollToTicker()">GO TO</button>
  <button class="btn" onclick="refreshAll()">↻ REFRESH</button>
  <div class="ticker-count">Showing <span id="visibleCount">76</span> / 76</div>
</div>

<div class="charts-container" id="chartsContainer"></div>
<footer>Yahoo Finance · 15-min delayed · Daily OHLC Bars · EMA 30 · EMA 60 · 3-Month</footer>
<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const TICKERS = [
  "AAOI","AEHR","AGCC","AGPU","AIOS","AKAN","ALM","ALMU","ALOY","ANPA",
  "BAOS","BE","BMHL","BNAI","BULL","BWXT","CHNR","CRCL","CRML","EGG",
  "FGL","FLY","FOFO","FORM","FTAI","HQ","IMSR","INTC","JLHL","KRKR",
  "LITE","LPTH","LUD","LWLG","MTC","MU","MXC","MXL","NBIS","NEGG",
  "NNNN","NOK","NPT","NVA","NVDA","OIO","PBM","PHOE","PL","POAS",
  "RDDT","RDW","RGC","ROMA","RYM","SATL","SIVEF","SKYQ","SNDK","SOGP",
  "SPHL","SUPX","TLRY","TRT","TSLA","TSM","UURAF","VG","WAFU","WNW",
  "WOLF","XNDU","YDDL","YI","YJ","YOOV","IWC","NEBX","QQQ","VCX"
];

// ── EMA ──────────────────────────────────────────────────────
function calcEMA(data, period) {
  const k = 2 / (period + 1);
  let ema = null;
  return data.map(d => {
    ema = ema === null ? d.close : d.close * k + ema * (1 - k);
    return { time: d.time, value: parseFloat(ema.toFixed(4)) };
  });
}

// ── Fetch with multiple proxy fallbacks ──────────────────────
async function fetchOHLCV(ticker) {
  const now  = Math.floor(Date.now() / 1000);
  const from = now - (110 * 86400);
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${from}&period2=${now}&includePrePost=false`;

  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yfUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yfUrl)}`
  ];

  let lastErr = null;
  for (const proxy of proxies) {
    try {
      const res  = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const raw  = await res.text();

      // allorigins wraps in {contents:...}, others return raw JSON
      let parsed;
      try {
        const wrapper = JSON.parse(raw);
        parsed = wrapper.contents ? JSON.parse(wrapper.contents) : wrapper;
      } catch { continue; }

      const result = parsed?.chart?.result?.[0];
      if (!result) continue;

      const ts = result.timestamp;
      const q  = result.indicators.quote[0];
      const bars = [];
      for (let i = 0; i < ts.length; i++) {
        if (!q.open[i] || !q.close[i]) continue;
        bars.push({
          time:   ts[i],
          open:   +q.open[i].toFixed(4),
          high:   +q.high[i].toFixed(4),
          low:    +q.low[i].toFixed(4),
          close:  +q.close[i].toFixed(4),
          volume: q.volume[i] || 0
        });
      }
      bars.sort((a,b) => a.time - b.time);
      if (bars.length) return bars;
    } catch(e) { lastErr = e; }
  }
  throw new Error(lastErr?.message || 'All proxies failed');
}

// ── Lightweight Charts config ────────────────────────────────
function makeChartOpts(el) {
  return {
    container: el,
    width:  el.offsetWidth,
    height: 500,
    layout: {
      background: { color: '#050505' },
      textColor:  '#666',
      fontFamily: "'Share Tech Mono', monospace",
      fontSize:   10
    },
    grid: {
      vertLines: { color: '#141414' },
      horzLines:  { color: '#141414' }
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: {
      borderColor: '#2a2a2a',
      scaleMargins: { top: 0.08, bottom: 0.08 }
    },
    timeScale: {
      borderColor:    '#2a2a2a',
      timeVisible:    true,
      secondsVisible: false,
      fixLeftEdge:    true,
      fixRightEdge:   true,
      barSpacing:     11
    },
    handleScroll: true,
    handleScale:  true
  };
}

function makeVolOpts(el) {
  return {
    container: el,
    width:  el.offsetWidth,
    height: 60,
    layout: {
      background: { color: '#050505' },
      textColor:  '#555',
      fontFamily: "'Share Tech Mono', monospace",
      fontSize:   9
    },
    grid: {
      vertLines: { color: '#0f0f0f' },
      horzLines:  { color: '#0f0f0f' }
    },
    rightPriceScale: {
      borderColor: '#2a2a2a',
      scaleMargins: { top: 0.05, bottom: 0 },
      drawTicks: false
    },
    timeScale: {
      borderColor:    '#2a2a2a',
      timeVisible:    true,
      secondsVisible: false,
      fixLeftEdge:    true,
      fixRightEdge:   true
    },
    handleScroll: false,
    handleScale:  false
  };
}

const allCharts = [];
const container = document.getElementById('chartsContainer');
let currentTickers = [...TICKERS];

// ── Build one card ───────────────────────────────────────────
async function buildCard(ticker) {
  const safeId = ticker.replace(/[^a-zA-Z0-9]/g,'_');
  const card   = document.createElement('div');
  card.className    = 'chart-card';
  card.dataset.ticker = ticker;
  card.innerHTML = `
    <div class="chart-header">
      <span class="ticker-label">${ticker}</span>
      <div class="price-block">
        <span class="price-val" id="pv_${safeId}">--</span>
        <span class="chg" id="pc_${safeId}"></span>
        <span class="sep">|</span>
        <div class="ema-vals">
          <span class="ema-label">EMA30</span>
          <span class="ema-pill e30" id="e30_${safeId}">--</span>
          <span class="ema-label">EMA60</span>
          <span class="ema-pill e60" id="e60_${safeId}">--</span>
        </div>
      </div>
    </div>
    <div class="chart-status" id="st_${safeId}">Loading…</div>
    <div class="chart-body" id="cb_${safeId}"></div>
    <div class="vol-body"   id="vb_${safeId}"></div>`;
  container.appendChild(card);

  try {
    const bars = await fetchOHLCV(ticker);
    if (!bars.length) throw new Error('No data');
    document.getElementById('st_' + safeId).textContent = '';

    // Header stats
    const last   = bars[bars.length - 1];
    const prev   = bars[bars.length - 2];
    const chgPct = prev ? ((last.close - prev.close) / prev.close * 100) : 0;
    document.getElementById('pv_' + safeId).textContent = last.close.toFixed(2);
    const chgEl = document.getElementById('pc_' + safeId);
    chgEl.textContent  = (chgPct >= 0 ? '+' : '') + chgPct.toFixed(2) + '%';
    chgEl.className    = 'chg ' + (chgPct >= 0 ? 'up' : 'dn');

    // EMA values
    const ema30data = calcEMA(bars, 30);
    const ema60data = calcEMA(bars, 60);
    document.getElementById('e30_' + safeId).textContent = ema30data[ema30data.length-1].value.toFixed(2);
    document.getElementById('e60_' + safeId).textContent = ema60data[ema60data.length-1].value.toFixed(2);

    // ── Main chart ───────────────────────────────────────────
    const chartEl = document.getElementById('cb_' + safeId);
    const chart   = LightweightCharts.createChart(chartEl, makeChartOpts(chartEl));

    // OHLC bar series — thin bars, no price line
    const barSeries = chart.addBarSeries({
      upColor:          '#00cc44',
      downColor:        '#ff4444',
      thinBars:         true,
      priceLineVisible: false
    });
    barSeries.setData(bars);

    // EMA 30 — orange, value label on right axis only (no broken line across chart)
    const ema30s = chart.addLineSeries({
      color:                  '#ff8c00',
      lineWidth:              1.5,
      priceLineVisible:       false,
      lastValueVisible:       true,
      crosshairMarkerVisible: false
    });
    ema30s.setData(ema30data);

    // EMA 60 — blue, value label on right axis only (no broken line across chart)
    const ema60s = chart.addLineSeries({
      color:                  '#1e90ff',
      lineWidth:              1.5,
      priceLineVisible:       false,
      lastValueVisible:       true,
      crosshairMarkerVisible: false
    });
    ema60s.setData(ema60data);

    chart.timeScale().fitContent();
    allCharts.push({ chart, el: chartEl });

    // ── Volume ───────────────────────────────────────────────
    const volEl    = document.getElementById('vb_' + safeId);
    const volChart = LightweightCharts.createChart(volEl, makeVolOpts(volEl));

    // Use a bar series for volume to get thin 1px sticks — much thinner than histogram
    const volSeries = volChart.addHistogramSeries({
      priceFormat:  { type: 'volume' },
      priceScaleId: 'right',
      scaleMargins: { top: 0.0, bottom: 0 },
      base: 0
    });

    volSeries.setData(bars.map(b => ({
      time:  b.time,
      value: b.volume,
      color: b.close >= b.open ? 'rgba(0,180,60,0.7)' : 'rgba(220,50,50,0.7)'
    })));

    // Force very tight bar spacing on vol chart to make bars thin
    volChart.applyOptions({
      timeScale: {
        barSpacing: 3,
        fixLeftEdge: true,
        fixRightEdge: true,
        borderColor: '#1a1a1a',
        timeVisible: false
      }
    });
    volChart.timeScale().fitContent();

    // Sync crosshair
    chart.subscribeCrosshairMove(p => {
      if (p?.time) volChart.setCrosshairPosition(0, p.time, volSeries);
      else volChart.clearCrosshairPosition();
    });

    allCharts.push({ chart: volChart, el: volEl });

  } catch(e) {
    document.getElementById('st_'  + safeId).textContent = '⚠ ' + e.message;
    document.getElementById('cb_'  + safeId).style.display = 'none';
    document.getElementById('vb_'  + safeId).style.display = 'none';
  }
}

// ── Render ───────────────────────────────────────────────────
async function renderCharts(tickers) {
  container.innerHTML  = '';
  allCharts.length     = 0;
  currentTickers       = tickers;
  document.getElementById('visibleCount').textContent = tickers.length;
  const BATCH = 5;
  for (let i = 0; i < tickers.length; i += BATCH) {
    await Promise.all(tickers.slice(i, i + BATCH).map(buildCard));
  }
}

function filterCharts(q) {
  q = q.trim().toUpperCase();
  renderCharts(q ? TICKERS.filter(t => t.includes(q)) : TICKERS);
}

function scrollToTicker() {
  const q = document.getElementById('filterInput').value.trim().toUpperCase();
  document.querySelector(`.chart-card[data-ticker="${q}"]`)
    ?.scrollIntoView({ behavior:'smooth', block:'start' });
}

function refreshAll() { renderCharts(currentTickers); }

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US',{hour12:false,timeZone:'America/Chicago'}) + ' CT';
}
setInterval(updateClock, 1000); updateClock();

// Scroll-to-top
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 500);
});

// Auto-refresh every 5 min during market hours
setInterval(() => {
  const ct  = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'}));
  const h   = ct.getHours(), m = ct.getMinutes(), day = ct.getDay();
  if (day>=1&&day<=5&&(h>8||(h===8&&m>=30))&&h<16) refreshAll();
}, 5*60*1000);

// Window resize
window.addEventListener('resize', () => {
  allCharts.forEach(({chart, el}) => chart.resize(el.offsetWidth, el.offsetHeight));
});

renderCharts(TICKERS);
</script>
</body>
</html>
