<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Watchlist — EMA 30/60</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --surface: #0d1117;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #cdd9e5;
    --muted: #546e7a;
    --green: #00e676;
    --red: #ff1744;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9,12,16,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--accent); letter-spacing: 2px; }
  .logo span { color: var(--accent2); }
  .header-meta { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 20px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,0.5)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,230,118,0)} }

  .controls {
    padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .controls label { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
  .controls input[type=text] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;
    font-size: 13px; width: 220px; outline: none; transition: border-color 0.2s;
  }
  .controls input[type=text]:focus { border-color: var(--accent); }
  .btn { padding: 6px 16px; border-radius: 4px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'Share Tech Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .ticker-count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }
  .ticker-count span { color: var(--accent); }

  .charts-container { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.2s; }
  .chart-card:hover { border-color: #2a3f52; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .ticker-label { font-family: 'Share Tech Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; }
  .chart-tags { display: flex; gap: 6px; }
  .tag { font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid; }
  .tag-ema30 { border-color: #ff9800; color: #ff9800; }
  .tag-ema60 { border-color: #2196f3; color: #2196f3; }
  .tag-vol   { border-color: var(--muted); color: var(--muted); }
  .tag-3m    { border-color: var(--muted); color: var(--muted); }

  /* Each chart widget container */
  .chart-body { width: 100%; height: 500px; position: relative; }
  .chart-body > div { height: 100% !important; }

  footer { text-align: center; padding: 24px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

  #scrollTop { position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-size: 18px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 200; font-family: monospace; }
  #scrollTop.visible { display: flex; }
</style>
</head>
<body>

<header>
  <div class="logo">WATCH<span>LIST</span></div>
  <div class="header-meta">
    <span><span class="live-dot"></span>LIVE</span>
    <span id="clock">--:--:--</span>
    <span>EMA 30 · EMA 60 · VOL · 3M DAILY</span>
  </div>
</header>

<div class="controls">
  <label>FILTER:</label>
  <input type="text" id="filterInput" placeholder="Search ticker..." oninput="filterCharts(this.value)">
  <button class="btn" onclick="filterCharts(''); document.getElementById('filterInput').value=''">CLEAR</button>
  <button class="btn" onclick="scrollToTicker()">GO TO</button>
  <div class="ticker-count">Showing <span id="visibleCount">76</span> / 76 charts</div>
</div>

<div class="charts-container" id="chartsContainer"></div>

<footer>Data by TradingView · 15-min delayed (free) · Daily Candles · EMA 30 (orange) · EMA 60 (blue) · Volume · 3-Month Range</footer>
<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const TICKERS = [
  "AAOI","AEHR","AGCC","AGPU","AIOS","AKAN","ALM","ALMU","ALOY","ANPA",
  "BAOS","BE","BMHL","BNAI","BULL","BWXT","CHNR","CRCL","CRML","EGG",
  "FGL","FLY","FOFO","FORM","FTAI","HQ","IMSR","INTC","JLHL","KRKR",
  "LITE","LPTH","LUD","LWLG","MTC","MU","MXC","MXL","NBIS","NEGG",
  "NNNN","NOK","NPT","NVA","NVDA","OIO","PBM","PHOE","PL","POAS",
  "RDDT","RDW","RGC","ROMA","RYM","SATL","SIVEF","SKYQ","SNDK","SOGP",
  "SPHL","SUPX","TLRY","TRT","TSLA","TSM","UURAF","VG","WAFU","WNW",
  "WOLF","XNDU","YDDL","YI","YJ","YOOV","IWC","NEBX","QQQ","VCX"
];

const container = document.getElementById('chartsContainer');
let widgetCounter = 0;

function renderCharts(tickers) {
  container.innerHTML = '';
  tickers.forEach(ticker => {
    widgetCounter++;
    const containerId = 'tv_widget_' + ticker.replace(/[^a-zA-Z0-9]/g, '_') + '_' + widgetCounter;

    const card = document.createElement('div');
    card.className = 'chart-card';
    card.dataset.ticker = ticker;
    card.innerHTML = `
      <div class="chart-header">
        <span class="ticker-label">${ticker}</span>
        <div class="chart-tags">
          <span class="tag tag-ema30">EMA 30</span>
          <span class="tag tag-ema60">EMA 60</span>
          <span class="tag tag-vol">VOL</span>
          <span class="tag tag-3m">3M · 1D</span>
        </div>
      </div>
      <div class="chart-body">
        <div id="${containerId}"></div>
      </div>`;
    container.appendChild(card);

    // Use TradingView Advanced Chart widget — this correctly sets interval + range + studies
    new TradingView.widget({
      container_id: containerId,
      autosize: true,
      symbol: ticker,
      interval: "D",          // Daily bars — locked
      range: "3M",             // 3-month range — locked
      timezone: "America/Chicago",
      theme: "dark",
      style: "1",              // Candlestick
      locale: "en",
      toolbar_bg: "#0d1117",
      backgroundColor: "rgba(9, 12, 16, 1)",
      gridColor: "rgba(30, 45, 61, 0.5)",
      hide_top_toolbar: false,
      hide_legend: false,
      withdateranges: false,
      allow_symbol_change: false,
      save_image: false,
      studies: [
        {
          id: "MAExp@tv-basicstudies",
          version: 1,
          inputs: { length: 30 }
        },
        {
          id: "MAExp@tv-basicstudies",
          version: 2,
          inputs: { length: 60 }
        },
        "Volume@tv-basicstudies"
      ],
      overrides: {
        "mainSeriesProperties.candleStyle.upColor":           "#00e676",
        "mainSeriesProperties.candleStyle.downColor":         "#ff1744",
        "mainSeriesProperties.candleStyle.borderUpColor":     "#00e676",
        "mainSeriesProperties.candleStyle.borderDownColor":   "#ff1744",
        "mainSeriesProperties.candleStyle.wickUpColor":       "#00e676",
        "mainSeriesProperties.candleStyle.wickDownColor":     "#ff1744"
      },
      studies_overrides: {
        "moving average exp.plot.color.0":     "#ff9800",
        "moving average exp.plot.linewidth.0": 1.5,
        "moving average exp.plot.color.1":     "#2196f3",
        "moving average exp.plot.linewidth.1": 1.5,
        "volume.volume.color.0":               "#ff1744",
        "volume.volume.color.1":               "#00e676"
      }
    });
  });

  document.getElementById('visibleCount').textContent = tickers.length;
}

function filterCharts(query) {
  const q = query.trim().toUpperCase();
  const filtered = q ? TICKERS.filter(t => t.includes(q)) : TICKERS;
  renderCharts(filtered);
}

function scrollToTicker() {
  const q = document.getElementById('filterInput').value.trim().toUpperCase();
  if (!q) return;
  const card = document.querySelector(`.chart-card[data-ticker="${q}"]`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour12: false, timeZone: 'America/Chicago' }) + ' CT';
}
setInterval(updateClock, 1000);
updateClock();

window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 600);
});

renderCharts(TICKERS);
</script>
</body>
</html>
